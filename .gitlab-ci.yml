stages:
  - validate
  - publish

variables:
  TF_VERSION: "1.6.0"

# Validate every module on every push
validate:
  stage: validate
  image: hashicorp/terraform:${TF_VERSION}
  script:
    - |
      for dir in modules/*/; do
        echo "Validating $dir"
        cd $dir
        terraform init -backend=false
        terraform validate
        cd ../..
      done
  rules:
    - if: '$CI_COMMIT_BRANCH'

# Publish triggered by a Git tag like: lambda/1.0.0
publish:
  stage: publish
  image: curlimages/curl:latest
  script:
    - |
      # Parse module name and version from the tag
      # Tag format: <module_name>/<version>  e.g. lambda/1.2.0
      MODULE_NAME=$(echo $CI_COMMIT_TAG | cut -d'/' -f1)
      MODULE_VERSION=$(echo $CI_COMMIT_TAG | cut -d'/' -f2)

      echo "Publishing module: $MODULE_NAME version: $MODULE_VERSION"

      # Create the archive of just this module
      tar -czf /tmp/${MODULE_NAME}-${MODULE_VERSION}.tgz -C modules/${MODULE_NAME} .

      # Upload to GitLab Terraform Module Registry
      curl --fail \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file /tmp/${MODULE_NAME}-${MODULE_VERSION}.tgz \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/cameron/${MODULE_NAME}/aws/${MODULE_VERSION}/file"

      echo "Published ${MODULE_NAME} v${MODULE_VERSION} to GitLab registry"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[a-z_]+\/[0-9]+\.[0-9]+\.[0-9]+$/'