stages:
  - validate
  - publish

variables:
  TF_VERSION: "1.6.0"

validate:
  stage: validate
  image:
    name: hashicorp/terraform:${TF_VERSION}
    entrypoint: [""]
  script:
    - |
      FAILED=0
      for dir in modules/*/; do
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Validating: $dir"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        (
          cd "$dir" || exit 1
          terraform init -backend=false -get=false -input=false 2>&1
          terraform validate 2>&1
        )
        if [ $? -ne 0 ]; then
          echo "❌ FAILED: $dir"
          FAILED=1
        else
          echo "✅ PASSED: $dir"
        fi
      done
      if [ $FAILED -ne 0 ]; then
        echo "One or more modules failed validation"
        exit 1
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH'

publish:
  stage: publish
  image: curlimages/curl:latest
  script:
    - |
      if [ -z "$CI_COMMIT_TAG" ]; then
        echo "CI_COMMIT_TAG is not set"
        exit 1
      fi

      MODULE_NAME=$(echo "$CI_COMMIT_TAG" | cut -d'/' -f1)
      MODULE_VERSION=$(echo "$CI_COMMIT_TAG" | cut -d'/' -f2)

      echo "CI_COMMIT_TAG:  $CI_COMMIT_TAG"
      echo "MODULE_NAME:    $MODULE_NAME"
      echo "MODULE_VERSION: $MODULE_VERSION"
      echo "CI_PROJECT_ID:  $CI_PROJECT_ID"
      echo "CI_API_V4_URL:  $CI_API_V4_URL"

      if [ -z "$MODULE_NAME" ] || [ -z "$MODULE_VERSION" ]; then
        echo "Could not parse MODULE_NAME or MODULE_VERSION"
        exit 1
      fi

      if [ ! -d "modules/${MODULE_NAME}" ]; then
        echo "Module directory not found: modules/${MODULE_NAME}"
        exit 1
      fi

      UPLOAD_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/terraform/modules/${MODULE_NAME}/aws/${MODULE_VERSION}/file"
      echo "Uploading to: $UPLOAD_URL"

      tar -czf /tmp/${MODULE_NAME}-${MODULE_VERSION}.tgz \
        -C modules/${MODULE_NAME} .

      curl --fail \
        --verbose \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file /tmp/${MODULE_NAME}-${MODULE_VERSION}.tgz \
        "$UPLOAD_URL" 2>&1

      echo "Published ${MODULE_NAME} v${MODULE_VERSION} successfully"
  rules:
    # Updated regex — allows module names starting with a letter
    # followed by letters, numbers, or underscores e.g. s3, api_gateway
    - if: '$CI_COMMIT_TAG =~ /^[a-z][a-z0-9_]*\/[0-9]+\.[0-9]+\.[0-9]+$/'