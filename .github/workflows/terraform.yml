name: Terraform CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  TF_VERSION: "1.6.0"
  TFLINT_VERSION: "0.50.0"
  TFSEC_VERSION: "1.28.0"
  CHECKOV_VERSION: "3.2.331"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v${{ env.TFLINT_VERSION }}

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint on all modules
        run: |
          for module in modules/*/; do
            echo "Linting $module"
            tflint --chdir="$module"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Validate module structure
        run: |
          for module in modules/*/; do
            if [ -d "$module" ]; then
              echo "Checking structure for $module"
              for required in main.tf variables.tf outputs.tf versions.tf README.md; do
                if [ ! -f "$module/$required" ]; then
                  echo "ERROR: Missing $required in $module"
                  exit 1
                fi
              done
            fi
          done

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate all modules
        run: |
          FAILED=0
          for module in modules/*/; do
            if [ -d "$module" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "Validating: $module"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              (
                cd "$module" || exit 1
                terraform init -backend=false -get=false -input=false
                terraform validate
              )
              if [ $? -ne 0 ]; then
                echo "❌ FAILED: $module"
                FAILED=1
              else
                echo "✅ PASSED: $module"
              fi
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "One or more modules failed validation"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: modules
          format: json
          soft_fail: false
          additional_args: --minimum-severity HIGH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov==${{ env.CHECKOV_VERSION }}

      - name: Run Checkov
        run: |
          checkov -d modules/ --output json --output-file checkov-report.json --soft-fail || true
          checkov -d modules/ --compact --quiet --soft-fail

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: checkov-report.json
          retention-days: 30
