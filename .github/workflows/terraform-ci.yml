name: Terraform Module CI

on:
  push:
    branches:
      - '**'
    tags:
      - '[a-z][a-z0-9_]*/[0-9]+.[0-9]+.[0-9]+'

env:
  TF_VERSION: "1.6.0"

jobs:
  validate:
    name: Validate Terraform Modules
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    container:
      image: hashicorp/terraform:${{ env.TF_VERSION }}
      options: --entrypoint ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate all modules
        shell: sh
        run: |
          FAILED=0
          for dir in modules/*/; do
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Validating: $dir"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            (
              cd "$dir" || exit 1
              terraform init -backend=false -get=false -input=false 2>&1
              terraform validate 2>&1
            )
            if [ $? -ne 0 ]; then
              echo "❌ FAILED: $dir"
              FAILED=1
            else
              echo "✅ PASSED: $dir"
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "One or more modules failed validation"
            exit 1
          fi

  publish:
    name: Publish Terraform Module
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse and publish module
        env:
          GITLAB_PROJECT_ID: ${{ secrets.GITLAB_PROJECT_ID }}
          GITLAB_API_URL: ${{ secrets.GITLAB_API_URL }}
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          MODULE_NAME=$(echo "$TAG" | cut -d'/' -f1)
          MODULE_VERSION=$(echo "$TAG" | cut -d'/' -f2)

          echo "TAG:            $TAG"
          echo "MODULE_NAME:    $MODULE_NAME"
          echo "MODULE_VERSION: $MODULE_VERSION"
          echo "PROJECT_ID:     $GITLAB_PROJECT_ID"
          echo "API_URL:        $GITLAB_API_URL"

          if [ -z "$MODULE_NAME" ] || [ -z "$MODULE_VERSION" ]; then
            echo "Could not parse MODULE_NAME or MODULE_VERSION"
            exit 1
          fi

          if [ ! -d "modules/${MODULE_NAME}" ]; then
            echo "Module directory not found: modules/${MODULE_NAME}"
            exit 1
          fi

          UPLOAD_URL="${GITLAB_API_URL}/projects/${GITLAB_PROJECT_ID}/packages/terraform/modules/${MODULE_NAME}/aws/${MODULE_VERSION}/file"
          echo "Uploading to: $UPLOAD_URL"

          tar -czf /tmp/${MODULE_NAME}-${MODULE_VERSION}.tgz \
            -C modules/${MODULE_NAME} .

          curl --fail \
            --verbose \
            --header "PRIVATE-TOKEN: ${GITLAB_TOKEN}" \
            --upload-file /tmp/${MODULE_NAME}-${MODULE_VERSION}.tgz \
            "$UPLOAD_URL" 2>&1

          echo "Published ${MODULE_NAME} v${MODULE_VERSION} successfully"