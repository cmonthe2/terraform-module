name: Terraform CI

on:
  push:
    branches:
      - main
      - develop
    tags:
      - '*/*'
  pull_request:
    branches:
      - main
      - develop

env:
  TF_VERSION: "1.6.0"
  TFLINT_VERSION: "0.50.0"
  TFSEC_VERSION: "1.28.0"
  CHECKOV_VERSION: "3.2.331"
  INFRACOST_VERSION: "0.10.0"
  TFDOCS_VERSION: "0.16.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v${{ env.TFLINT_VERSION }}

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint on all modules
        run: |
          for module in modules/*/; do
            echo "Linting $module"
            tflint --chdir="$module"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Validate module structure
        run: |
          for module in modules/*/; do
            if [ -d "$module" ]; then
              echo "Checking structure for $module"
              for required in main.tf variables.tf outputs.tf versions.tf README.md; do
                if [ ! -f "$module/$required" ]; then
                  echo "ERROR: Missing $required in $module"
                  exit 1
                fi
              done
            fi
          done

  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate all modules
        run: |
          FAILED=0
          for module in modules/*/; do
            if [ -d "$module" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "Validating: $module"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              (
                cd "$module" || exit 1
                terraform init -backend=false -get=false -input=false
                terraform validate
              )
              if [ $? -ne 0 ]; then
                echo "❌ FAILED: $module"
                FAILED=1
              else
                echo "✅ PASSED: $module"
              fi
            fi
          done
          if [ $FAILED -ne 0 ]; then
            echo "One or more modules failed validation"
            exit 1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: modules
          format: json
          soft_fail: false
          additional_args: --minimum-severity HIGH

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Checkov
        run: pip install checkov==${{ env.CHECKOV_VERSION }}

      - name: Run Checkov
        run: |
          checkov -d modules/ --output json --output-file checkov-report.json --soft-fail || true
          checkov -d modules/ --compact --quiet --soft-fail

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            checkov-report.json
          retention-days: 30

  cost:
    name: Cost Estimation
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref_type == 'branch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Infracost
        uses: infracost/actions/setup@v3
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate cost estimates
        run: |
          for example in examples/*/; do
            if [ -d "$example" ]; then
              echo "Estimating costs for $example"
              cd "$example"
              infracost breakdown --path . --format json --out-file ../../infracost-$(basename "$example").json || true
              cd -
            fi
          done

      - name: Post cost comment
        uses: infracost/actions/comment@v1
        if: always()
        with:
          path: infracost-*.json
          behavior: update

      - name: Upload cost reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cost-reports
          path: infracost-*.json
          retention-days: 30

  publish:
    name: Publish Module
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse_tag
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          MODULE_NAME=$(echo "$TAG" | cut -d'/' -f1)
          MODULE_VERSION=$(echo "$TAG" | cut -d'/' -f2)

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "module_name=$MODULE_NAME" >> $GITHUB_OUTPUT
          echo "module_version=$MODULE_VERSION" >> $GITHUB_OUTPUT

          echo "Tag: $TAG"
          echo "Module: $MODULE_NAME"
          echo "Version: $MODULE_VERSION"

      - name: Validate module exists
        run: |
          if [ ! -d "modules/${{ steps.parse_tag.outputs.module_name }}" ]; then
            echo "ERROR: Module directory not found: modules/${{ steps.parse_tag.outputs.module_name }}"
            exit 1
          fi

      - name: Create release archive
        run: |
          cd modules/${{ steps.parse_tag.outputs.module_name }}
          tar -czf ../../${{ steps.parse_tag.outputs.module_name }}-${{ steps.parse_tag.outputs.module_version }}.tar.gz .
          cd ../..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.parse_tag.outputs.module_name }}-${{ steps.parse_tag.outputs.module_version }}.tar.gz
          tag_name: ${{ steps.parse_tag.outputs.tag }}
          name: ${{ steps.parse_tag.outputs.module_name }} v${{ steps.parse_tag.outputs.module_version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
